<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" shape-rendering="crispEdges">

  <!-- Left lens frame -->
  <rect x="32" y="96" width="80" height="64" fill="#2850a8"/>

  <!-- Left lens inner -->
  <rect x="40" y="104" width="64" height="48" fill="#0c1030"/>

  <!-- Code reflections in left lens -->
  <rect x="44" y="108" width="20" height="4" fill="#00eeff" opacity="0.7"/>
  <rect x="68" y="108" width="12" height="4" fill="#ff66ff" opacity="0.6"/>
  <rect x="48" y="116" width="16" height="4" fill="#55ffaa" opacity="0.6"/>
  <rect x="68" y="116" width="20" height="4" fill="#ffee33" opacity="0.55"/>
  <rect x="48" y="124" width="28" height="4" fill="#00eeff" opacity="0.65"/>
  <rect x="44" y="132" width="12" height="4" fill="#ff8833" opacity="0.6"/>
  <rect x="60" y="132" width="24" height="4" fill="#55ffaa" opacity="0.55"/>
  <rect x="48" y="140" width="20" height="4" fill="#ff66ff" opacity="0.55"/>
  <rect x="72" y="140" width="24" height="4" fill="#00eeff" opacity="0.5"/>

  <!-- Left lens glare -->
  <rect x="40" y="104" width="32" height="4" fill="white" opacity="0.15"/>
