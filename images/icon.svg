  <!-- Right lens frame -->
  <rect x="144" y="96" width="80" height="64" fill="#2850a8"/>

  <!-- Right lens inner -->
  <rect x="152" y="104" width="64" height="48" fill="#0c1030"/>

  <!-- Code reflections in right lens -->
  <rect x="156" y="108" width="24" height="4" fill="#ff66ff" opacity="0.6"/>
  <rect x="184" y="108" width="16" height="4" fill="#00eeff" opacity="0.7"/>
  <rect x="160" y="116" width="20" height="4" fill="#ffee33" opacity="0.55"/>
  <rect x="184" y="116" width="12" height="4" fill="#55ffaa" opacity="0.6"/>
  <rect x="156" y="124" width="36" height="4" fill="#00eeff" opacity="0.65"/>
  <rect x="160" y="132" width="16" height="4" fill="#55ffaa" opacity="0.6"/>
  <rect x="180" y="132" width="20" height="4" fill="#ff8833" opacity="0.55"/>
  <rect x="156" y="140" width="28" height="4" fill="#ff66ff" opacity="0.55"/>
  <rect x="188" y="140" width="16" height="4" fill="#00eeff" opacity="0.5"/>

  <!-- Right lens glare -->
  <rect x="152" y="104" width="32" height="4" fill="white" opacity="0.15"/>
  <rect x="152" y="108" width="8" height="8" fill="white" opacity="0.08"/>

  <!-- Bridge -->
  <rect x="112" y="104" width="8" height="8" fill="#2850a8"/>
  <rect x="136" y="104" width="8" height="8" fill="#2850a8"/>
  <rect x="112" y="112" width="8" height="8" fill="#2850a8"/>
  <rect x="136" y="112" width="8" height="8" fill="#2850a8"/>
  <rect x="120" y="116" width="8" height="8" fill="#2850a8"/>
  <rect x="128" y="116" width="8" height="8" fill="#2850a8"/>
  <!-- Nose pads -->
  <rect x="116" y="124" width="8" height="8" fill="#2850a8"/>
  <rect x="132" y="124" width="8" height="8" fill="#2850a8"/>
  <rect x="116" y="132" width="8" height="4" fill="#1e4090"/>
  <rect x="132" y="132" width="8" height="4" fill="#1e4090"/>

  <!-- Frame highlight (top edge) -->
  <rect x="32" y="96" width="80" height="4" fill="#4070d0" opacity="0.7"/>
  <rect x="144" y="96" width="80" height="4" fill="#4070d0" opacity="0.7"/>

  <!-- Temples -->
  <rect x="8" y="104" width="8" height="8" fill="#1e4090"/>
  <rect x="16" y="104" width="8" height="8" fill="#2850a8"/>
  <rect x="24" y="104" width="8" height="8" fill="#2850a8"/>
  <rect x="24" y="112" width="8" height="4" fill="#4070d0" opacity="0.5"/>

  <rect x="224" y="104" width="8" height="8" fill="#2850a8"/>
  <rect x="232" y="104" width="8" height="8" fill="#2850a8"/>
  <rect x="240" y="104" width="8" height="8" fill="#1e4090"/>
  <rect x="224" y="112" width="8" height="4" fill="#4070d0" opacity="0.5"/>
